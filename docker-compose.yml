version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nightcrow
      POSTGRES_USER: crow
      POSTGRES_PASSWORD: crowpass2026
    volumes: [postgres_data:/var/lib/postgresql/data]
    ports: ["5432:5432"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  backend:
    build: ./backend
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
  celery-worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info
    env_file: .env
    depends_on: [redis, postgres]
  celery-beat:
    build: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    depends_on: [redis]
volumes:
  postgres_data: